<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kiwi Secure Relay</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      width: 280px;
      padding: 16px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      margin: 0;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .company {
      font-size: 11px;
      color: #8892b0;
    }
    .status-box {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .status-row:last-child {
      margin-bottom: 0;
    }
    .status-label {
      color: #8892b0;
      font-size: 12px;
    }
    .status-value {
      font-weight: 600;
      font-size: 12px;
    }
    .status-value.connected {
      color: #00a651;
    }
    .status-value.disconnected {
      color: #ef4444;
    }
    .vps-address {
      font-family: monospace;
      font-size: 10px;
      color: #64ffda;
      background: rgba(100,255,218,0.1);
      padding: 4px 8px;
      border-radius: 4px;
      margin-top: 8px;
      word-break: break-all;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-attach {
      background: linear-gradient(135deg, #00a651 0%, #007a3d 100%);
      color: white;
    }
    .btn-attach:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,166,81,0.4);
    }
    .btn-detach {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
    }
    .btn-detach:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239,68,68,0.4);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      font-size: 11px;
      padding: 8px;
      border-radius: 6px;
      margin-top: 12px;
      text-align: center;
    }
    .message.error {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
    }
    .message.success {
      background: rgba(0,166,81,0.2);
      color: #86efac;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🦞</div>
    <div class="company">Shenzhen Kiwi Technology Co., Ltd.</div>
  </div>
  
  <div class="status-box">
    <div class="status-row">
      <span class="status-label">VPS Connection</span>
      <span class="status-value" id="connection-status">Checking...</span>
    </div>
    <div class="status-row">
      <span class="status-label">Tab Status</span>
      <span class="status-value" id="tab-status">Not Attached</span>
    </div>
    <div class="vps-address" id="vps-address">ws://93.127.213.22:18792</div>
  </div>
  
  <button class="btn btn-attach" id="btn-attach">Attach Secure Tab</button>
  <button class="btn btn-detach hidden" id="btn-detach">Detach Tab</button>
  
  <div class="message hidden" id="message"></div>
  
  <script src="popup.js"></script>
</body>
</html>
