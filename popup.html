<!DOCTYPE html>
<html>
<head>
  <title>Kiwi Secure Relay</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      padding: 16px;
      text-align: center;
      background: linear-gradient(135deg, #00a651 0%, #008c44 100%);
      color: white;
      min-width: 200px;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }
    .subtitle {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 16px;
    }
    button {
      background: white;
      color: #00a651;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 4px;
    }
    button:hover {
      background: #f0f0f0;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      background: rgba(0,0,0,0.2);
    }
    .status-attached {
      background: rgba(255,255,255,0.2) !important;
    }
    .status-error {
      background: rgba(239,68,68,0.5) !important;
    }
  </style>
</head>
<body>
  <h2>🦞 Kiwi Secure Relay</h2>
  <p class="subtitle">Shenzhen Kiwi Technology Co., Ltd.</p>
  
  <button id="attachBtn">Attach Secure Tab</button>
  <button id="detachBtn" style="display: none;">Detach Tab</button>
  
  <div id="status">Disconnected</div>
  
  <script src="popup.js"></script>
</body>
</html>
